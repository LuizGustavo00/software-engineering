spring.application.name=SoftwareEngineer

# ???????????????????????????????????????????????????????????????????????????????
# DATABASE CONFIGURATION
# ???????????????????????????????????????????????????????????????????????????????
# LOCAL (padr„o): H2 em memÛria
# CI/PRODU«√O: Use vari·veis de ambiente para PostgreSQL

spring.datasource.url=${DB_URL:jdbc:h2:mem:softwareengineer}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.initializationFailTimeout=0

# ???????????????????????????????????????????????????????????????????????????????
# JPA / HIBERNATE CONFIGURATION
# ???????????????????????????????????????????????????????????????????????????????

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=${ALLOW_JDBC_METADATA:true}

# ???????????????????????????????????????????????????????????????????????????????
# FLYWAY CONFIGURATION (Database Migrations)
# ???????????????????????????????????????????????????????????????????????????????
# - Desabilitado em LOCAL (H2 usa create-drop)
# - Habilitado em CI/PROD (PostgreSQL)

spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

# ???????????????????????????????????????????????????????????????????????????????
# H2 CONSOLE (apenas LOCAL)
# ???????????????????????????????????????????????????????????????????????????????
# Acesse em: http://localhost:8080/h2-console (usu·rio: sa, senha: vazia)

spring.h2.console.enabled=${H2_CONSOLE:true}
